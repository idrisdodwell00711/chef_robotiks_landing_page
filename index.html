<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chef Robotiks | Automate Your Kitchen</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#000}
.glow{text-shadow:0 0 10px rgba(249,115,22,0.7)}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
  100%{transform:translateY(0)}
}

.float{animation: float 4s ease-in-out infinite;}

@keyframes spinSlow{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

.spin-slow{animation: spinSlow 20s linear infinite;}
</style>
</head>

<body class="text-gray-200 font-sans">

<div class="flex justify-center mt-6">
<svg class="w-16 spin-slow" viewBox="0 0 100 100">
<circle cx="50" cy="50" r="45" stroke="#f97316" stroke-width="2" fill="none" opacity="0.3"/>
<text x="50" y="58" text-anchor="middle" fill="#f97316" font-size="28" font-family="monospace">1/s</text>
</svg>
</div>

<div class="flex justify-center mt-12">
<svg class="w-20 float" viewBox="0 0 200 200">
<line x1="100" y1="20" x2="100" y2="40" stroke="#f97316" stroke-width="3"/>
<circle cx="100" cy="18" r="4" fill="#f97316"/>
<ellipse cx="100" cy="60" rx="30" ry="12" fill="#e5e7eb"/>
<rect x="70" y="60" width="60" height="12" fill="#e5e7eb"/>
<circle cx="100" cy="105" r="30" fill="#111" stroke="#f97316" stroke-width="3"/>
<circle cx="90" cy="100" r="5" fill="#f97316"/>
<circle cx="110" cy="100" r="5" fill="#f97316"/>
<rect x="85" y="98" width="30" height="4" fill="#7c2d12"/>
<rect x="75" y="130" width="50" height="35" rx="6" fill="#111" stroke="#f97316" stroke-width="3"/>
<rect x="55" y="135" width="20" height="6" fill="#f97316"/>
<rect x="125" y="135" width="20" height="6" fill="#f97316"/>
</svg>
</div>

<section class="max-w-5xl mx-auto px-6 py-24 text-center">
<p class="text-orange-400 text-sm tracking-widest mb-4">FOR CAFÉS & SMALL KITCHENS</p>

<h1 class="text-5xl font-bold leading-tight">
Reduce Kitchen Labour with
<span class="text-orange-400 glow">Smart Automation</span>
</h1>

<p class="mt-6 text-gray-400 text-lg max-w-2xl mx-auto">
We help cafés automate repetitive kitchen tasks like prep, assembly, and plating.
</p>

<div class="mt-10">
<a href="#form" class="bg-orange-500 hover:bg-orange-400 text-black px-8 py-4 rounded-lg font-semibold text-lg">
Join Pilot Programme
</a>
</div>
</section>

<section id="form" class="max-w-xl mx-auto px-6 py-20">
<div class="bg-gray-900 p-8 rounded-xl border border-gray-800">
<h3 class="text-xl font-semibold text-center">Apply for Pilot</h3>

<iframe 
src="https://docs.google.com/forms/d/e/1FAIpQLSfhOxifNwIc1rgv9ptcu-Llms2gcLcSxH35FE0td0a6xzEzcQ/viewform?embedded=true"
width="100%" height="800" class="mt-6 rounded-lg border border-gray-800">
</iframe>

</div>
</section>

</body>
</html>
